<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prototypes｜产品原型导航</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card: rgba(255,255,255,.82);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --border: rgba(0,0,0,.08);
      --shadow: 0 20px 60px rgba(0,0,0,.08);
      --blue: #0071e3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(0,113,227,.16), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(120,80,255,.14), transparent 30%),
        var(--bg);
    }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 56px 28px; }
    .hero { margin-bottom: 28px; }
    .eyebrow { color: var(--blue); font-size: 14px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    h1 { font-size: 44px; line-height: 1.08; margin: 12px 0 14px; letter-spacing: -.04em; }
    .desc { max-width: 720px; color: var(--muted); font-size: 18px; line-height: 1.7; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; margin-top: 34px; }
    .card {
      display: block;
      padding: 24px;
      min-height: 190px;
      color: inherit;
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 26px 70px rgba(0,0,0,.12); }
    .tag { display: inline-flex; padding: 6px 10px; border-radius: 999px; background: rgba(0,113,227,.1); color: var(--blue); font-size: 12px; font-weight: 700; }
    h2 { margin: 18px 0 10px; font-size: 22px; letter-spacing: -.02em; }
    p { color: var(--muted); line-height: 1.65; margin: 0; }
    .footer { margin-top: 42px; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="eyebrow">Product Prototypes</div>
      <h1>产品 HTML 原型导航</h1>
      <div class="desc">这里用于集中管理 MaaS、智算私有云、Agent 平台、监控告警、运营管理等产品原型页面。后续接入 Vercel 后，可以直接嵌入飞书文档展示。</div>
    </section>

    <section class="grid">
      <a class="card" href="./alert-dashboard/">
        <span class="tag">Dashboard</span>
        <h2>告警分析大屏</h2>
        <p>用于展示节点、管理服务、用户 Pod 等告警策略的分布、趋势、优先级和处理建议。</p>
      </a>
    </section>

    <div class="footer">Repository: miaohui1212/prototypes</div>
  </main>
</body>
</html>
